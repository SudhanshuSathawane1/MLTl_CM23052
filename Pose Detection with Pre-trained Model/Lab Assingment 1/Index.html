<!DOCTYPE html>
<html>
<head>
  <title>Pose Skeleton</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
</head>

<body>
<h2>Pose Skeleton Detection</h2>

<video id="video" width="400" autoplay></video>
<canvas id="canvas" width="400" height="300"></canvas>

<script>
let net;

async function setup() {
  const video = document.getElementById("video");
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;

  net = await posenet.load();
  detect(video);
}

function drawSkeleton(keypoints, ctx) {
  const pairs = [
    [5,7],[7,9], [6,8],[8,10],
    [5,6], [5,11],[6,12],
    [11,12], [11,13],[13,15],
    [12,14],[14,16]
  ];

  ctx.strokeStyle = "red";

  pairs.forEach(([a,b]) => {
    const kp1 = keypoints[a];
    const kp2 = keypoints[b];

    if (kp1.score > 0.5 && kp2.score > 0.5) {
      ctx.beginPath();
      ctx.moveTo(kp1.position.x, kp1.position.y);
      ctx.lineTo(kp2.position.x, kp2.position.y);
      ctx.stroke();
    }
  });
}

async function detect(video) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  async function loop() {
    const pose = await net.estimateSinglePose(video);

    ctx.clearRect(0,0,400,300);

    pose.keypoints.forEach(kp => {
      if (kp.score > 0.5) {
        ctx.beginPath();
        ctx.arc(kp.position.x, kp.position.y, 5, 0, 2*Math.PI);
        ctx.fill();
      }
    });

    drawSkeleton(pose.keypoints, ctx);

    requestAnimationFrame(loop);
  }

  loop();
}

setup();
</script>
</body>
</html>
