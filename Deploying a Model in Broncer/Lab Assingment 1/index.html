<!DOCTYPE html>
<html>
<head>
  <title>Train & Save Model</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>

<body>
<h2>Train and Save Model</h2>
<button onclick="train()">Train Model</button>
<p id="status"></p>

<script>
let model;

async function train() {
  model = tf.sequential();

  model.add(tf.layers.dense({units: 8, inputShape: [1], activation: 'relu'}));
  model.add(tf.layers.dense({units: 1}));

  model.compile({
    optimizer: 'sgd',
    loss: 'meanSquaredError'
  });

  const xs = tf.tensor([1,2,3,4,5]);
  const ys = tf.tensor([2,4,6,8,10]); // y = 2x

  await model.fit(xs, ys, {epochs: 100});

  await model.save('localstorage://my-model');

  document.getElementById("status").innerText = "Model trained & saved!";
}
</script>
</body>
</html>
